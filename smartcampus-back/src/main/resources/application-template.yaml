#项目名称
spring:
  application:
    name: smartcampus
#数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_campus?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 你的MySQL密码
  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 服务端口
server:
  port: 8080

# 自定义JWT密钥配置
jwt:
  secret: SmartCampus2026SecretKey20260716
  expire: 86400000

# DeepSeek AI
deepseek:
  api-key: 你的DeepSeek密钥